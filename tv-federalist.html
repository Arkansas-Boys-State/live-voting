<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Federalist · Voter Display</title>
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --party:       #1A4F8A;
  --party-light: #4A82C8;
  --party-dim:   rgba(26,79,138,0.12);
  --party-glow:  rgba(26,79,138,0.3);
  --bg:          #080C14;
  --surface:     #0D1420;
  --fg:          #EEF2F8;
  --fg-dim:      rgba(238,242,248,0.45);
  --gold:        #C8A96A;
}

body {
  width:100vw; height:100vh;
  background: var(--bg);
  color: var(--fg);
  font-family: 'Barlow Condensed', sans-serif;
  overflow: hidden;
  display: flex; flex-direction: column;
}

body::after {
  content:''; position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:100; opacity:.6;
}

/* Right side accent bar */
.side-bar {
  position:fixed; right:0; top:0; bottom:0; width:8px;
  background: linear-gradient(180deg, transparent 0%, var(--party) 20%, var(--party) 80%, transparent 100%);
}

.top-strip {
  height:56px;
  background: var(--surface);
  border-bottom: 1px solid rgba(200,169,106,0.15);
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 28px 0 36px;
  flex-shrink:0; position:relative; z-index:10;
}

.party-badge { display:flex; align-items:center; gap:14px; }

.party-dot {
  width:10px; height:10px; border-radius:50%;
  background: var(--party);
  box-shadow: 0 0 12px var(--party-glow);
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100%{ box-shadow:0 0 8px var(--party-glow); }
  50%{ box-shadow:0 0 20px var(--party), 0 0 40px var(--party-glow); }
}

.party-name-top {
  font-size:18px; font-weight:800;
  letter-spacing:6px; text-transform:uppercase;
  color: var(--fg);
}

.station-tag { font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--fg-dim); }

.main {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px 48px; position:relative;
}

.main::before {
  content:''; position:absolute;
  top:-60px; left:-60px;
  width:300px; height:300px;
  background: var(--party-dim);
  border-radius:50%; filter:blur(80px);
  pointer-events:none;
}

#idle {
  display:flex; flex-direction:column;
  align-items:center; gap:20px; text-align:center;
  transition: opacity .5s ease;
}
#idle.hidden { opacity:0; pointer-events:none; position:absolute; }

.idle-emblem {
  width:100px; height:100px;
  border:1.5px solid rgba(200,169,106,0.3);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  position:relative;
  animation: spin 40s linear infinite;
}
.idle-emblem::before {
  content:'· · · · · · · ·';
  position:absolute; inset:4px;
  border:1px solid rgba(26,79,138,0.25);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:8px; letter-spacing:6px;
  color:rgba(200,169,106,0.3);
  animation:spin 40s linear infinite reverse;
  text-align:center; line-height:96px;
}
@keyframes spin { to{ transform:rotate(360deg); } }

.idle-flag { font-size:38px; animation:spin 40s linear infinite reverse; }

.idle-h {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(36px,5vw,62px); font-weight:700;
  line-height:1; color:var(--fg);
}
.idle-h em { color:var(--party-light); font-style:normal; }

.idle-rule {
  width:80px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.idle-sub { font-size:13px; letter-spacing:5px; text-transform:uppercase; color:var(--fg-dim); }

#confirmation {
  display:flex; flex-direction:column;
  align-items:center; gap:0; text-align:center;
  opacity:0; pointer-events:none; position:absolute;
  transition: opacity .5s ease;
  width:100%; padding:0 48px;
}
#confirmation.visible { opacity:1; pointer-events:auto; position:relative; }

.confirmed-tag {
  font-size:11px; letter-spacing:6px; text-transform:uppercase;
  color:var(--party-light); font-weight:700; margin-bottom:20px;
  animation:fadeUp .5s ease both;
}

.check-mark {
  width:72px; height:72px;
  border:2px solid var(--party);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:30px; background:var(--party-dim); margin-bottom:24px;
  animation:popIn .5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes popIn {
  from{ transform:scale(0) rotate(-15deg); opacity:0; }
  to{ transform:scale(1) rotate(0); opacity:1; }
}

.voter-name {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(52px,8vw,110px); font-weight:700;
  line-height:.95; color:var(--fg); margin-bottom:20px;
  animation:fadeUp .5s ease .2s both;
}

.voter-rule {
  width:160px; height:2px;
  background:linear-gradient(90deg,transparent,var(--party),transparent);
  margin:0 auto 24px;
  animation:fadeUp .5s ease .3s both;
}

.voter-meta {
  display:flex; gap:40px; align-items:center; justify-content:center;
  animation:fadeUp .5s ease .4s both;
}

.meta-item { display:flex; flex-direction:column; gap:4px; align-items:center; }
.meta-label { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--fg-dim); font-weight:600; }
.meta-val { font-size:clamp(20px,3vw,34px); font-weight:700; color:var(--gold); letter-spacing:1px; }
.meta-sep { color:rgba(200,169,106,0.3); font-size:32px; align-self:center; }

@keyframes fadeUp {
  from{ transform:translateY(16px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}

.bottom-bar {
  height:44px; background:var(--surface);
  border-top:1px solid rgba(200,169,106,0.1);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px 0 36px;
  flex-shrink:0; position:relative; z-index:10;
}

.countdown-wrap { display:flex; align-items:center; gap:10px; }
.countdown-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--fg-dim); }
#countdownNum { font-size:14px; font-weight:700; color:var(--party-light); min-width:24px; }

.timer-track { width:180px; height:3px; background:rgba(200,169,106,0.12); border-radius:2px; overflow:hidden; }
.timer-fill { height:100%; width:100%; background:linear-gradient(90deg,var(--party),var(--party-light)); transform-origin:left; transition:none; }
.timer-fill.running { transition:transform 30s linear; transform:scaleX(0); }

.live-dot {
  display:flex; align-items:center; gap:8px;
  font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--fg-dim);
}
.live-dot::before {
  content:''; width:6px; height:6px; border-radius:50%; background:var(--party);
  animation:dotPulse 2s ease-in-out infinite;
}
</style>
</head>
<body>

<div class="side-bar"></div>

<div class="top-strip">
  <div class="station-tag">TV Station 3 · Right Display</div>
  <div class="party-badge">
    <div class="party-name-top">Federalist Party</div>
    <div class="party-dot"></div>
  </div>
</div>

<div class="main">
  <div id="idle">
    <div class="idle-emblem"><div class="idle-flag">🏛️</div></div>
    <div class="idle-rule"></div>
    <div class="idle-h">FEDERALIST<br><em>PARTY</em></div>
    <div class="idle-rule"></div>
    <div class="idle-sub">Awaiting voter check-in…</div>
  </div>

  <div id="confirmation">
    <div class="confirmed-tag">✓ Voter Confirmed</div>
    <div class="check-mark">✓</div>
    <div class="voter-name" id="voterName">—</div>
    <div class="voter-rule"></div>
    <div class="voter-meta">
      <div class="meta-item">
        <div class="meta-label">Party</div>
        <div class="meta-val" id="voterParty">—</div>
      </div>
      <div class="meta-sep">·</div>
      <div class="meta-item">
        <div class="meta-label">Office</div>
        <div class="meta-val" id="voterOffice">—</div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="live-dot">Live · Polling</div>
  <div class="countdown-wrap">
    <div class="countdown-label">Resets in</div>
    <div id="countdownNum">—</div>
    <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
  </div>
</div>

<script>
const PARTY_KEY = 'federalist';
const POLL_MS   = 4000;
const SHOW_MS   = 30000;

const idle   = document.getElementById('idle');
const conf   = document.getElementById('confirmation');
const nameEl = document.getElementById('voterName');
const partyEl= document.getElementById('voterParty');
const offEl  = document.getElementById('voterOffice');
const fill   = document.getElementById('timerFill');
const numEl  = document.getElementById('countdownNum');

let lastSeen = null, resetTimer = null, countTimer = null;

function showVoter(entry) {
  nameEl.textContent  = entry.name   || '—';
  partyEl.textContent = entry.party  || 'Federalist';
  offEl.textContent   = entry.office || '—';

  idle.classList.add('hidden');
  conf.classList.remove('visible');
  void conf.offsetWidth;
  conf.classList.add('visible');

  fill.classList.remove('running');
  fill.style.transform = 'scaleX(1)';
  void fill.offsetWidth;
  fill.classList.add('running');

  let secs = SHOW_MS / 1000;
  numEl.textContent = secs + 's';
  if (countTimer) clearInterval(countTimer);
  countTimer = setInterval(() => {
    secs--;
    numEl.textContent = secs > 0 ? secs + 's' : '—';
    if (secs <= 0) clearInterval(countTimer);
  }, 1000);

  if (resetTimer) clearTimeout(resetTimer);
  resetTimer = setTimeout(resetToIdle, SHOW_MS);
}

function resetToIdle() {
  conf.classList.remove('visible');
  idle.classList.remove('hidden');
  fill.classList.remove('running');
  fill.style.transform = 'scaleX(1)';
  numEl.textContent = '—';
}

async function poll() {
  const cfg = ELECTION_CONFIG.jsonbin;
  if (cfg.binId === 'YOUR_BIN_ID_HERE') return;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, {
      headers:{ 'X-Access-Key': cfg.apiKey, 'X-Bin-Meta': 'false' }
    });
    if (!res.ok) return;
    const data = await res.json();
    const entries = data[PARTY_KEY];
    if (!Array.isArray(entries) || !entries.length) return;
    const latest = entries[entries.length - 1];
    const key = latest.ts || JSON.stringify(latest);
    if (key !== lastSeen) { lastSeen = key; showVoter(latest); }
  } catch(e) {}
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>

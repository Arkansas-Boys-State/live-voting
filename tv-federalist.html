<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Federalist · Voter Display</title>
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --party:       #B22222;
  --party-light: #E8534A;
  --party-dim:   rgba(178,34,34,0.12);
  --party-glow:  rgba(178,34,34,0.25);
  --bg:          #0C0A0A;
  --surface:     #140E0E;
  --fg:          #F5F0EB;
  --fg-dim:      rgba(245,240,235,0.45);
  --gold:        #C8A96A;

  /* Gradient customization colors (Matched to Center Red & Shadow) */
  --red-vibrant: #EF4444;
  --red-dark:    #330B0B;

  /* Non-Partisan Slate Palette */
  --slate:       #64748B;
  --slate-glow:  rgba(100, 116, 139, 0.6);

  /* Global scaling matched to previous file layout scale */
  --ui-scale: 1;
}

body {
  width:100vw; height:100vh;
  background: var(--bg);
  color: var(--fg);
  font-family: 'Barlow Condensed', sans-serif;
  overflow: hidden;
  display: flex; flex-direction: column;
  font-size: calc(16px * var(--ui-scale));
}

body::after {
  content:''; position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:100; opacity:.6;
}

/* Right side accent bar */
.side-bar {
  position:fixed; right:0; top:0; bottom:0; width:8px;
  background: linear-gradient(180deg, transparent 0%, var(--party) 20%, var(--party) 80%, transparent 100%);
  z-index: 15;
}

/* Top & bottom custom red rules */
.h-rule-top,
.h-rule-bot {
  position:fixed;
  left:0;
  right:0;
  height:6px;
  z-index: 20;
  background: linear-gradient(
    90deg,
    var(--red-vibrant) 0%,
    var(--red-dark) 100%
  );
}
.h-rule-top { top:0; }
.h-rule-bot { bottom:0; }

/* Top strip */
.top-strip {
  height:56px;
  background: var(--surface);
  border-bottom: 1px solid rgba(200,169,106,0.15);
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 28px 0 36px;
  flex-shrink:0; position:relative; z-index:10;
  margin-top: 6px; /* Offset for top gradient bar */
}

.party-badge { display:flex; align-items:center; gap:14px; }

.party-dot {
  width:10px; height:10px; border-radius:50%;
  background: var(--party);
  box-shadow: 0 0 12px var(--party-glow);
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100%{ box-shadow:0 0 8px var(--party-glow); }
  50%{ box-shadow:0 0 20px var(--party), 0 0 40px var(--party-glow); }
}

.party-name-top {
  font-size:18px; font-weight:800;
  letter-spacing:6px; text-transform:uppercase;
  color: var(--fg);
}

.station-tag { font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--fg-dim); }

/* Main content area */
.main {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px 60px; position:relative;
  max-width:1200px;
  margin: 0 auto;
}

/* Diagonal accent */
.main::before {
  content:''; position:absolute;
  top:-60px; left:-60px;
  width:400px; height:400px;
  background: var(--party-dim);
  border-radius:50%; filter:blur(80px);
  pointer-events:none;
}

/* ── IDLE ── */
#idle {
  display:flex; flex-direction:column;
  align-items:center; gap:28px; text-align:center;
  transition: opacity .5s ease;
}
#idle.hidden { opacity:0; pointer-events:none; position:absolute; }

/* Enlarged Logo Ring Setup */
.idle-emblem {
  width:280px; height:280px;
  border:2px solid rgba(200,169,106,0.3);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  position:relative;
  background: rgba(200,169,106,0.02);
  animation: spin 60s linear infinite;
}
.idle-emblem::before {
  content:'· · · · · · · · · · · · · · · ·';
  position:absolute; inset:8px;
  border:1px solid rgba(26,79,138,0.15);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; letter-spacing:10px;
  color:rgba(200,169,106,0.3);
  animation:spin 60s linear infinite reverse;
  text-align:center; line-height:260px;
}
@keyframes spin { to{ transform:rotate(360deg); } }

/* SVG Logo Styling */
.idle-logo-svg {
  width: 250px;
  height: 250px;
  object-fit: contain;
  filter: drop-shadow(0 0 15px var(--slate-glow));
  
  /* Counter-rotation to keep the logo right side up while ring spins */
  animation: spin 60s linear infinite reverse; 
}

.idle-h {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(64px, 7vw, 96px); font-weight:700;
  line-height:0.95; color:var(--fg);
  letter-spacing: -1px;
}
.idle-h em { color:var(--party-light); font-style:normal; }

.idle-rule {
  width:140px; height:1.5px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.idle-sub { font-size:18px; letter-spacing:6px; text-transform:uppercase; color:var(--fg-dim); }

/* ── CONFIRMATION ── */
#confirmation {
  display:flex; flex-direction:column;
  align-items:center; gap:0; text-align:center;
  opacity:0; pointer-events:none; position:absolute;
  transition: opacity .5s ease;
  width:100%; padding:0 60px;
}
#confirmation.visible { opacity:1; pointer-events:auto; position:relative; }

.confirmed-tag {
  font-size:16px; letter-spacing:6px; text-transform:uppercase;
  color:var(--party-light); font-weight:700; margin-bottom:24px;
  animation:fadeUp .5s ease both;
}

.check-mark {
  width:96px; height:96px;
  border:2px solid var(--party);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:42px; color: var(--gold);
  background:var(--party-dim); margin-bottom:32px;
  animation:popIn .5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes popIn {
  from{ transform:scale(0) rotate(-15deg); opacity:0; }
  to{ transform:scale(1) rotate(0); opacity:1; }
}

.voter-name {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(64px,9vw,115px); font-weight:700;
  line-height:.95; color:var(--fg); margin-bottom:24px;
  animation:fadeUp .5s ease .2s both;
}

.voter-rule {
  width:220px; height:2px;
  background:linear-gradient(90deg,transparent,var(--party),transparent);
  margin:0 auto 32px;
  animation:fadeUp .5s ease .3s both;
}

.voter-meta {
  display:flex; gap:56px; align-items:center; justify-content:center;
  animation:fadeUp .5s ease .4s both;
}

.meta-item { display:flex; flex-direction:column; gap:6px; align-items:center; }
.meta-label { font-size:12px; letter-spacing:4px; text-transform:uppercase; color:var(--fg-dim); font-weight:600; }
.meta-val { font-size:clamp(26px,4vw,42px); font-weight:700; color:var(--gold); letter-spacing:1px; }
.meta-sep { color:rgba(200,169,106,0.3); font-size:42px; align-self:center; }

@keyframes fadeUp {
  from{ transform:translateY(16px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}

/* Bottom bar */
.bottom-bar {
  height:64px; background:var(--surface);
  border-top:1px solid rgba(200,169,106,0.1);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 36px 0 36px;
  flex-shrink:0; position:relative; z-index:10;
  margin-bottom: 6px; /* Offset for bottom gradient bar */
}

.countdown-wrap { display:flex; align-items:center; gap:10px; }
.countdown-label { font-size:16px; letter-spacing:3px; text-transform:uppercase; color:var(--fg-dim); }
#countdownNum { font-size:18px; font-weight:700; color:var(--party-light); min-width:24px; }

.timer-track { width:180px; height:3px; background:rgba(200,169,106,0.12); border-radius:2px; overflow:hidden; }
.timer-fill { height:100%; width:100%; background:linear-gradient(90deg,var(--party),var(--party-light)); transform-origin:left; transition:none; }
.timer-fill.running { transition:transform 30s linear; transform:scaleX(0); }

.live-dot {
  display:flex; align-items:center; gap:8px;
  font-size:14px; letter-spacing:3px; text-transform:uppercase; color:var(--fg-dim);
}
.live-dot::before {
  content:''; width:8px; height:8px; border-radius:50%; background:var(--party);
  animation:dotPulse 2s ease-in-out infinite;
}

@media (min-width: 3000px) {
  :root {
    --ui-scale: 1.8;
  }
  .main {
    transform: scale(1.15);
  }
}
</style>
</head>
<body>

<div class="side-bar"></div>

<div class="h-rule-top"></div>
<div class="h-rule-bot"></div>

<div class="top-strip">
  <div class="station-tag">TV Station 3 · Right Display</div>
  <div class="party-badge">
    <div class="party-name-top">Federalist Party</div>
    <div class="party-dot"></div>
  </div>
</div>

<div class="main">
  <div id="idle">
    <div class="idle-emblem">
      <img src="federalist-logo.svg" alt="Federalist Party Logo" class="idle-logo-svg">
    </div>
    <div class="idle-rule"></div>
    <div class="idle-h">FEDERALIST<br><em>PARTY</em></div>
    <div class="idle-rule"></div>
    <div class="idle-sub">Awaiting voter check-in…</div>
  </div>

  <div id="confirmation">
    <div class="confirmed-tag">✓ Voter Confirmed</div>
    <div class="check-mark">✓</div>
    <div class="voter-name" id="voterName">—</div>
    <div class="voter-rule"></div>
    <div class="voter-meta">
      <div class="meta-item">
        <div class="meta-label">Party</div>
        <div class="meta-val" id="voterParty">—</div>
      </div>
      <div class="meta-sep">·</div>
      <div class="meta-item">
        <div class="meta-label">Office</div>
        <div class="meta-val" id="voterOffice">—</div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="live-dot">Live · Registration</div>
  <div class="countdown-wrap">
    <div class="countdown-label">Registration Closes In:</div>
    <div id="countdownNum">—</div>
    <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
  </div>
</div>

<script>
const PARTY_KEY = 'federalist';
const POLL_MS   = 4000;

// Set the target date and time (12:15 PM CST on May 26, 2026)
const TARGET_TIME = new Date('2026-05-26T12:15:00-05:00').getTime();

const idle   = document.getElementById('idle');
const conf   = document.getElementById('confirmation');
const nameEl = document.getElementById('voterName');
const partyEl= document.getElementById('voterParty');
const offEl  = document.getElementById('voterOffice');
const fill   = document.getElementById('timerFill');
const numEl  = document.getElementById('countdownNum');

let lastSeen = null;

function showVoter(entry) {
  nameEl.textContent  = entry.name   || '—';
  partyEl.textContent = entry.party  || 'Federalist';
  offEl.textContent   = entry.office || '—';

  idle.classList.add('hidden');
  conf.style.opacity = '0';
  conf.style.position = 'absolute';
  conf.classList.remove('visible');
  void conf.offsetWidth;
  conf.classList.add('visible');
  conf.style.position = '';
}

// Global Countdown Timer Logic
function updateCountdown() {
  const now = new Date().getTime();
  const distance = TARGET_TIME - now;

  if (distance < 0) {
    numEl.textContent = "00:00:00";
    fill.style.transform = 'scaleX(0)';
    return;
  }

  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  const hDisplay = hours.toString().padStart(2, '0');
  const mDisplay = minutes.toString().padStart(2, '0');
  const sDisplay = seconds.toString().padStart(2, '0');

  numEl.textContent = `${hDisplay}:${mDisplay}:${sDisplay}`;

  const totalWindow = 24 * 60 * 60 * 1000; 
  const progress = Math.max(0, Math.min(1, distance / totalWindow));
  fill.style.transform = `scaleX(${progress})`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

async function poll() {
  const cfg = ELECTION_CONFIG.jsonbin;
  if (cfg.binId === 'YOUR_BIN_ID_HERE') return;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, {
      headers:{ 'X-Access-Key': cfg.apiKey, 'X-Bin-Meta': 'false' }
    });
    if (!res.ok) return;
    const data = await res.json();
    const entries = data[PARTY_KEY];
    if (!Array.isArray(entries) || !entries.length) return;
    const latest = entries[entries.length - 1];
    const key = latest.ts || JSON.stringify(latest);
    if (key !== lastSeen) { lastSeen = key; showVoter(latest); }
  } catch(e) {}
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
